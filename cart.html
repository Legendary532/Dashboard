<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.1/css/boxicons.min.css" rel="stylesheet">
    <script src="script.js"></script>
    <title>User Dashboard</title>
    <style>
        /* Cart Page Styles */
.cart-items {
    margin-top: 20px;
}

.cart-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    margin-bottom: 20px;
    background-color: #fff;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    border-radius: 10px;
}

.cart-item img {
    width: 100px;
    height: 100px;
    object-fit: cover;
}

.cart-item-info {
    flex: 1;
}

.cart-item-info h3 {
    font-size: 18px;
    margin: 0;
}

.cart-item-info p {
    margin: 10px 0;
}

.quantity input {
    width: 60px;
    padding: 5px;
    font-size: 14px;
}

.remove-item {
    background-color: #ff4d4d;
    color: white;
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.remove-item:hover {
    background-color: #ff1a1a;
}

.cart-summary {
    margin-top: 40px;
    background-color: #fff;
    padding: 20px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    border-radius: 10px;
}

.cart-summary h3 {
    font-size: 24px;
    margin-bottom: 20px;
}

.cart-summary p {
    font-size: 18px;
    margin-bottom: 10px;
}

.checkout-btn {
    background-color: #4CAF50;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.checkout-btn:hover {
    background-color: #45a049;
}

    </style>
</head>
<body>
    <div class="container">
        <div class="menu-toggle" id="menu-toggle-btn">
        </div>
        <aside class="hide">
            <div class="top">
                <div class="logo">
                    <h2>EGA<span class="danger">TOR</span></h2>
                </div>
            </div>
            <div class="sidebar">
                <a href="index.html">
                    <i class='bx bxs-dashboard'></i>
                    <h3>Dashboard</h3>
                </a>
                <a href="orders.html">
                    <i class='bx bx-package'></i>
                    <h3>My Orders</h3>
                </a>
                <a href="wishlist.html">
                    <i class='bx bx-heart'></i>
                    <h3>Wishlist</h3>
                </a>
                <a href="profile.html">
                    <i class='bx bx-user'></i>
                    <h3>Profile</h3>
                </a>
                <a href="cart.html" class="active">
                    <i class='bx bx-cart'></i>
                    <h3>Cart</h3>
                </a>
                <a href="logout.html">
                    <i class='bx bx-log-out'></i>
                    <h3>Logout</h3>
                </a>
            </div>
        </aside>
        <!-- Main Content Section -->
        <main>
            <h1>Your Shopping Cart</h1>

            <!-- Cart Items -->
            <div class="cart-items">
                <div class="cart-item">
                    <img src="dress 2.webp" alt="Product 1">
                    <div class="cart-item-info">
                        <h3>Product 1</h3>
                        <p>Price: $50.00</p>
                        <div class="quantity">
                            <label for="quantity1">Quantity</label>
                            <input type="number" id="quantity1" value="2" min="1">
                        </div>
                    </div>
                    <button class="remove-item">Remove</button>
                </div>

                <div class="cart-item">
                    <img src="shoes 2.webp" alt="Product 2">
                    <div class="cart-item-info">
                        <h3>Product 2</h3>
                        <p>Price: $30.00</p>
                        <div class="quantity">
                            <label for="quantity2">Quantity</label>
                            <input type="number" id="quantity2" value="1" min="1">
                        </div>
                    </div>
                    <button class="remove-item">Remove</button>
                </div>

                <!-- More items can go here -->
            </div>

            <!-- Cart Summary -->
            <div class="cart-summary">
                <h3>Cart Summary</h3>
                <p>Total Items: <span id="total-items">3</span></p>
                <p>Total Price: <span id="total-price">$130.00</span></p>
                <button class="checkout-btn">Proceed to Checkout</button>
            </div>
        </main>

        <!-- Right Section (Profile Updates) -->
        <div class="right">
            <div class="top">
                <div class="profile">
                    <div class="info">
                        <p>Hey, <b>Alina</b></p>
                        <small class="text-muted">Customer</small>
                    </div>
                    <div class="profile-photo">
                        <img src="dp.jpeg">
                    </div>
                </div>
            </div>

            <div class="recent-updates">
                <h2>Recent Activity</h2>
                <div class="updates">
                    <div class="update">
                        <div class="profile-photo">
                            <img src="m3.jpg">
                        </div>
                        <div class="message">
                            <p><b>Mike Tyson</b> updated their cart.</p>
                            <small class="text-muted">10 Minutes Ago</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
// Grab necessary DOM elements
const removeButtons = document.querySelectorAll('.remove-item');
const quantityInputs = document.querySelectorAll('.quantity input');
const totalPriceElement = document.getElementById('total-price');
const totalItemsElement = document.getElementById('total-items');

// Example of items data
const cartItems = [
    { name: 'Product 1', price: 50.00, quantity: 2 },
    { name: 'Product 2', price: 30.00, quantity: 1 }
];

// Function to update the cart summary
function updateCartSummary() {
    let totalItems = 0;
    let totalPrice = 0;

    cartItems.forEach(item => {
        totalItems += item.quantity;
        totalPrice += item.price * item.quantity;
    });

    totalItemsElement.textContent = totalItems;
    totalPriceElement.textContent = `$${totalPrice.toFixed(2)}`;
}

// Event listener for removing items from the cart
removeButtons.forEach((button, index) => {
    button.addEventListener('click', () => {
        cartItems.splice(index, 1); // Remove item from cart
        button.closest('.cart-item').remove(); // Remove item from DOM
        updateCartSummary(); // Update the cart summary
    });
});

// Event listener for updating quantities
quantityInputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        cartItems[index].quantity = parseInt(input.value); // Update quantity
        updateCartSummary(); // Update the cart summary
    });
});

// Initialize the cart summary
updateCartSummary();

    </script>
</body>
</html>
